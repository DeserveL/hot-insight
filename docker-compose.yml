services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: hot-insight-api
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: hot-insight-web
    restart: unless-stopped
    environment:
      API_INTERNAL_BASE_URL: http://api:8000
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

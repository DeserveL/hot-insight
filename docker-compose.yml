services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: hot-insight-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: ${APP_TIME_ZONE:-Asia/Shanghai}
      APP_TIME_ZONE: ${APP_TIME_ZONE:-Asia/Shanghai}
    volumes:
      - ./data:/app/data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS --max-time 5 http://127.0.0.1:8000/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: hot-insight-web
    restart: unless-stopped
    environment:
      API_INTERNAL_BASE_URL: http://api:8000
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-http://localhost:3000}
      TZ: ${APP_TIME_ZONE:-Asia/Shanghai}
      NEXT_PUBLIC_SITE_TIME_ZONE: ${APP_TIME_ZONE:-Asia/Shanghai}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
